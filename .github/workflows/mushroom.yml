name: worker

on:
  push:

jobs:
  childhood:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stair: ["post", "immeasurable", "emperor", "uncertain", "relationship"]
        every: ["inferior", "desire", "precaution", "fit"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java -jar aA
